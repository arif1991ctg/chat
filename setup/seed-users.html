<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatVibe — Setup Users</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .setup-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .setup-card {
      width: 100%;
      max-width: 520px;
      padding: 40px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
    }
    .setup-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .setup-card p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; }
    .log {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      line-height: 1.8;
    }
    .log .success { color: #00e676; }
    .log .error { color: #ff5252; }
    .log .info { color: #00d4ff; }
    .btn-setup {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      color: white;
      font-family: 'Inter', sans-serif;
    }
    .btn-setup:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back {
      display: inline-block;
      margin-top: 16px;
      color: #00d4ff;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="setup-wrapper">
    <div class="setup-card">
      <h1>⚙️ Setup Users</h1>
      <p>Click below to create the two pre-configured user accounts in Firebase Auth and Firestore.</p>

      <div class="log" id="log">
        <div class="info">Ready. Click the button to start setup.</div>
      </div>

      <button class="btn-setup" id="setupBtn" onclick="runSetup()">🚀 Create Users</button>
      <br>
      <a href="../index.html" class="btn-back">← Back to Login</a>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>

  <script>
    const USERS = [
      { phone: '01822858585', password: '123456' },
      { phone: '01850821127', password: '123456' }
    ];

    const EMAIL_DOMAIN = '@chatapp.com';
    const logEl = document.getElementById('log');

    function log(msg, type = 'info') {
      logEl.innerHTML += `<div class="${type}">${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function runSetup() {
      const btn = document.getElementById('setupBtn');
      btn.disabled = true;
      logEl.innerHTML = '';

      log('Starting user setup...', 'info');

      for (const u of USERS) {
        const email = u.phone + EMAIL_DOMAIN;
        log(`\nCreating user: ${u.phone} (${email})`, 'info');

        try {
          // Try to create user
          const cred = await auth.createUserWithEmailAndPassword(email, u.password);
          log(`✓ Auth account created: ${cred.user.uid}`, 'success');

          // Create Firestore user document
          await db.collection('users').doc(cred.user.uid).set({
            phoneNumber: u.phone,
            displayName: u.phone,
            email: email,
            online: false,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          log(`✓ Firestore profile created for ${u.phone}`, 'success');

          // Sign out so we can create the next user
          await auth.signOut();

        } catch (error) {
          if (error.code === 'auth/email-already-in-use') {
            log(`⚠ User ${u.phone} already exists — skipping`, 'info');

            // Still ensure Firestore doc exists
            try {
              // Sign in to get the uid
              const cred = await auth.signInWithEmailAndPassword(email, u.password);
              await db.collection('users').doc(cred.user.uid).set({
                phoneNumber: u.phone,
                displayName: u.phone,
                email: email,
                online: false,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
              }, { merge: true });
              log(`✓ Firestore profile verified for ${u.phone}`, 'success');
              await auth.signOut();
            } catch (e) {
              log(`✗ Could not verify profile: ${e.message}`, 'error');
            }
          } else {
            log(`✗ Error: ${error.message}`, 'error');
          }
        }
      }

      log('\n🎉 Setup complete! You can now go to the login page.', 'success');
      btn.disabled = false;
    }
  </script>
</body>
</html>
